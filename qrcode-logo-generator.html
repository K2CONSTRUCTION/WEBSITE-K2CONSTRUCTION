<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>បង្កើត QR Code ជាមួយ Logo</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Khmer OS', 'Noto Sans Khmer', system-ui, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #e2e8f0;
  }
  .card {
    background: #ffffff;
    color: #1e293b;
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 20px;
    margin: 0 0 20px;
    text-align: center;
    color: #0f172a;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin: 16px 0 6px;
    color: #334155;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: #6366f1;
  }
  input[type="file"] {
    width: 100%;
    font-size: 13px;
  }
  .row {
    display: flex;
    gap: 12px;
  }
  .row > div {
    flex: 1;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #4338ca; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #qrWrap {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    min-height: 80px;
  }
  #qrCanvas {
    padding: 16px;
    background: white;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    max-width: 100%;
    height: auto;
  }
  #statusMsg {
    text-align: center;
    font-size: 12px;
    color: #94a3b8;
    margin-top: 8px;
    min-height: 16px;
  }
  #downloadBtn {
    display: none;
    background: #16a34a;
  }
  #downloadBtn:hover { background: #15803d; }

  /* Color swatch button */
  .color-swatch-btn {
    width: 100%;
    margin-top: 0;
    padding: 8px 10px;
    background: #ffffff;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
    color: #1e293b;
  }
  .color-swatch-btn:hover { background: #f8fafc; }
  .color-swatch-btn .swatch {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    flex-shrink: 0;
    background-image:
      linear-gradient(45deg, #ccc 25%, transparent 25%),
      linear-gradient(-45deg, #ccc 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ccc 75%),
      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
  }
  .color-swatch-btn .hex-label {
    font-family: monospace;
    text-transform: uppercase;
  }

  /* Color picker modal */
  .cp-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    align-items: flex-end;
    justify-content: center;
    z-index: 1000;
  }
  .cp-overlay.open {
    display: flex;
  }
  .cp-panel {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
  }
  .cp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 14px;
  }
  .cp-close {
    background: #f1f5f9;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    color: #334155;
  }
  .cp-sv {
    width: 100%;
    height: 150px;
    border-radius: 10px;
    display: block;
    cursor: crosshair;
    touch-action: none;
  }
  .cp-hue {
    width: 100%;
    height: 18px;
    border-radius: 9px;
    display: block;
    margin-top: 12px;
    cursor: pointer;
    touch-action: none;
  }
  .cp-hex-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }
  .cp-preview {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    flex-shrink: 0;
  }
  .cp-hex-row input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-family: monospace;
    font-size: 14px;
    text-transform: uppercase;
  }
  .cp-recent-label {
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    margin-top: 16px;
    margin-bottom: 8px;
  }
  .cp-recent-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 28px;
  }
  .cp-recent-swatch {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    cursor: pointer;
  }
  #cpApplyBtn {
    margin-top: 18px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🔳 បង្កើត QR Code ជាមួយ Logo</h1>

  <label>អត្ថបទ ឬ តំណភ្ជាប់ (URL)</label>
  <input type="text" id="qrText" placeholder="https://example.com" value="https://claude.ai">

  <label>Logo (ស្រេចចិត្ត)</label>
  <input type="file" id="logoInput" accept="image/*">

  <div class="row">
    <div>
      <label>ពណ៌ QR Code</label>
      <button type="button" class="color-swatch-btn" data-target="qrColor">
        <span class="swatch" id="swatch-qrColor" style="background:#000000"></span>
        <span class="hex-label" id="hexlabel-qrColor">#000000</span>
      </button>
    </div>
    <div>
      <label>ពណ៌ផ្ទៃខាងក្រោយ</label>
      <button type="button" class="color-swatch-btn" data-target="qrBgColor">
        <span class="swatch" id="swatch-qrBgColor" style="background:#ffffff"></span>
        <span class="hex-label" id="hexlabel-qrBgColor">#ffffff</span>
      </button>
    </div>
  </div>

  <div class="row">
    <div>
      <label>ទំហំ QR (px)</label>
      <input type="number" id="qrSize" value="300" min="150" max="600">
    </div>
    <div>
      <label>ទំហំ Logo (%)</label>
      <input type="number" id="logoSize" value="20" min="10" max="35">
    </div>
  </div>

  <label>អក្សរបន្ថែម (ស្រេចចិត្ត)</label>
  <input type="text" id="captionText" placeholder="ឧ. ស្កេនទីនេះ / ឈ្មោះហាង">

  <div class="row">
    <div>
      <label>ពណ៌អក្សរ</label>
      <button type="button" class="color-swatch-btn" data-target="captionColor">
        <span class="swatch" id="swatch-captionColor" style="background:#0f172a"></span>
        <span class="hex-label" id="hexlabel-captionColor">#0f172a</span>
      </button>
    </div>
    <div>
      <label>ទំហំអក្សរ (px)</label>
      <input type="number" id="captionSize" value="20" min="10" max="48">
    </div>
  </div>

  <button id="generateBtn">បង្កើត QR Code</button>

  <div id="qrWrap"><canvas id="qrCanvas"></canvas></div>
  <div id="statusMsg"></div>
  <button id="downloadBtn">⬇️ ទាញយករូបភាព</button>
</div>

<!-- Color picker modal -->
<div id="colorPickerOverlay" class="cp-overlay">
  <div class="cp-panel">
    <div class="cp-header">
      <span>ជ្រើសរើសពណ៌</span>
      <button type="button" id="cpCloseBtn" class="cp-close">✕</button>
    </div>

    <canvas id="cpSV" width="272" height="150" class="cp-sv"></canvas>
    <canvas id="cpHue" width="272" height="18" class="cp-hue"></canvas>

    <div class="cp-hex-row">
      <span class="cp-preview" id="cpPreview"></span>
      <input type="text" id="cpHexInput" maxlength="7" placeholder="#000000">
    </div>

    <div class="cp-recent-label">ពណ៌ថ្មីៗ</div>
    <div class="cp-recent-row" id="cpRecentRow"></div>

    <button type="button" id="cpApplyBtn">ជ្រើសរើសពណ៌នេះ</button>
  </div>
</div>

<script>
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php
//
// The word 'QR Code' is registered trademark of
// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;

  // overwrite qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['UTF-8'];

}(qrcode);

// ===== App logic =====
let logoImg = null;

const qrTextEl = document.getElementById('qrText');
const qrSizeEl = document.getElementById('qrSize');
const logoSizeEl = document.getElementById('logoSize');
const logoInputEl = document.getElementById('logoInput');
const captionTextEl = document.getElementById('captionText');
const captionSizeEl = document.getElementById('captionSize');
const canvas = document.getElementById('qrCanvas');
const statusMsg = document.getElementById('statusMsg');
const downloadBtn = document.getElementById('downloadBtn');

// current color values for each swatch target
const colorState = {
  qrColor: '#000000',
  qrBgColor: '#ffffff',
  captionColor: '#0f172a'
};

logoInputEl.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) { logoImg = null; renderQR(); return; }
  const reader = new FileReader();
  reader.onload = (evt) => {
    const img = new Image();
    img.onload = () => { logoImg = img; renderQR(); };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('generateBtn').addEventListener('click', () => renderQR());

// Live preview: auto-render as the user types or adjusts settings
let debounceTimer = null;
['qrText', 'qrSize', 'logoSize', 'captionText', 'captionSize'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => renderQR(), 350);
  });
});

function renderQR() {
  try {
    const text = qrTextEl.value.trim() || 'https://example.com';
    let size = parseInt(qrSizeEl.value);
    if (!size || size < 100) size = 300;
    let logoPct = parseInt(logoSizeEl.value);
    if (!logoPct || logoPct < 5) logoPct = 20;
    const caption = captionTextEl.value.trim();
    let captionColor = colorState.captionColor;
    let captionFontSize = parseInt(captionSizeEl.value);
    if (!captionFontSize || captionFontSize < 8) captionFontSize = 20;

    let qrColor = colorState.qrColor;
    let qrBgColor = colorState.qrBgColor;

    statusMsg.textContent = '⏳ កំពុងបង្កើត...';
    downloadBtn.style.display = 'none';

    // typeNumber 0 = auto-select smallest size that fits the data
    const qr = qrcode(0, 'H'); // H = high error correction, needed for logo overlay
    qr.addData(text);
    qr.make();

    const moduleCount = qr.getModuleCount();
    const quietZone = 4; // modules of white border, per QR spec
    const totalModules = moduleCount + quietZone * 2;
    const cellSize = size / totalModules;

    // reserve extra height below the QR for the caption text
    const captionPadding = caption ? Math.round(captionFontSize * 1.8) : 0;
    const canvasHeight = size + captionPadding;

    canvas.width = size;
    canvas.height = canvasHeight;
    const ctx = canvas.getContext('2d');

    // background (includes quiet zone + caption area)
    ctx.fillStyle = qrBgColor;
    ctx.fillRect(0, 0, size, canvasHeight);

    // draw modules
    ctx.fillStyle = qrColor;
    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (qr.isDark(row, col)) {
          const x = (col + quietZone) * cellSize;
          const y = (row + quietZone) * cellSize;
          ctx.fillRect(x, y, Math.ceil(cellSize), Math.ceil(cellSize));
        }
      }
    }

    // overlay logo if provided
    if (logoImg) {
      const logoSizePx = size * (logoPct / 100);
      const x = (size - logoSizePx) / 2;
      const y = (size - logoSizePx) / 2;
      const pad = 6;

      ctx.fillStyle = qrBgColor;
      roundRect(ctx, x - pad, y - pad, logoSizePx + pad * 2, logoSizePx + pad * 2, 10);
      ctx.fill();

      ctx.drawImage(logoImg, x, y, logoSizePx, logoSizePx);
    }

    // draw caption text below the QR code
    if (caption) {
      ctx.fillStyle = isValidColor(captionColor) ? captionColor : '#0f172a';
      ctx.font = 'bold ' + captionFontSize + 'px "Khmer OS", "Noto Sans Khmer", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // shrink font to fit width if too long
      let fontSize = captionFontSize;
      const maxWidth = size - 24;
      while (ctx.measureText(caption).width > maxWidth && fontSize > 8) {
        fontSize -= 1;
        ctx.font = 'bold ' + fontSize + 'px "Khmer OS", "Noto Sans Khmer", sans-serif';
      }

      ctx.fillText(caption, size / 2, size + captionPadding / 2);
    }

    statusMsg.textContent = '✅ រួចរាល់';
    if (getContrastRatio(qrColor, qrBgColor) < 2.5) {
      statusMsg.textContent += ' — ⚠️ ពណ៌ខ្វះភាពផ្ទុយគ្នា អាចស្កេនពិបាក';
    }
    downloadBtn.style.display = 'block';
  } catch (err) {
    statusMsg.textContent = '⚠️ មានបញ្ហា៖ ' + err.message;
    console.error(err);
  }
}

function isValidColor(str) {
  const s = new Option().style;
  s.color = str;
  return s.color !== '';
}

function getLuminance(hexOrColor) {
  const el = document.createElement('div');
  el.style.color = hexOrColor;
  el.style.display = 'none';
  document.body.appendChild(el);
  const computed = getComputedStyle(el).color;
  document.body.removeChild(el);
  const m = computed.match(/\d+/g);
  if (!m) return 0;
  const [r, g, b] = m.map(Number).map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}

function getContrastRatio(colorA, colorB) {
  const l1 = getLuminance(colorA);
  const l2 = getLuminance(colorB);
  const lighter = Math.max(l1, l2);
  const darker = Math.min(l1, l2);
  return (lighter + 0.05) / (darker + 0.05);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

downloadBtn.addEventListener('click', async function() {
  canvas.toBlob(async function(blob) {
    if (!blob) return;

    // Modern browsers (e.g. Chrome desktop/Android): let user pick location + filename
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'qrcode-with-logo.png',
          types: [{
            description: 'PNG Image',
            accept: { 'image/png': ['.png'] }
          }]
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        statusMsg.textContent = '✅ បានរក្សាទុកដោយជោគជ័យ';
        return;
      } catch (err) {
        if (err.name === 'AbortError') {
          // user cancelled the save dialog, do nothing
          return;
        }
        // fall through to fallback method on other errors
      }
    }

    // Fallback: standard browser download (Safari/iOS/older browsers)
    // On iOS this typically opens the native "Save to Files / Photos" sheet
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'qrcode-with-logo.png';
    link.href = url;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    statusMsg.textContent = '✅ បានទាញយក';
  }, 'image/png');
});

// ===== Color Picker Widget =====
const cpOverlay = document.getElementById('colorPickerOverlay');
const cpSV = document.getElementById('cpSV');
const cpHue = document.getElementById('cpHue');
const cpHexInput = document.getElementById('cpHexInput');
const cpPreview = document.getElementById('cpPreview');
const cpRecentRow = document.getElementById('cpRecentRow');
const cpApplyBtn = document.getElementById('cpApplyBtn');
const cpCloseBtn = document.getElementById('cpCloseBtn');

const svCtx = cpSV.getContext('2d');
const hueCtx = cpHue.getContext('2d');

let cpActiveTarget = null; // which color field ('qrColor' | 'qrBgColor' | 'captionColor')
let cpHueVal = 0;   // 0-360
let cpSatVal = 0;   // 0-1
let cpValVal = 0;   // 0-1
let recentColors = [];

function hsvToRgb(h, s, v) {
  h = h / 360;
  let r, g, b;
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
}

function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
    if (h < 0) h += 360;
  }
  const s = max === 0 ? 0 : d / max;
  const v = max;
  return [h, s, v];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function hexToRgb(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  if (hex.length !== 6) return null;
  const num = parseInt(hex, 16);
  if (isNaN(num)) return null;
  return [(num >> 16) & 255, (num >> 8) & 255, num & 255];
}

function drawHueBar() {
  const w = cpHue.width, h = cpHue.height;
  const grad = hueCtx.createLinearGradient(0, 0, w, 0);
  for (let i = 0; i <= 360; i += 30) {
    grad.addColorStop(i / 360, 'hsl(' + i + ',100%,50%)');
  }
  hueCtx.fillStyle = grad;
  hueCtx.fillRect(0, 0, w, h);

  // marker
  const x = (cpHueVal / 360) * w;
  hueCtx.strokeStyle = '#ffffff';
  hueCtx.lineWidth = 3;
  hueCtx.strokeRect(x - 2, 0, 4, h);
  hueCtx.strokeStyle = 'rgba(0,0,0,0.4)';
  hueCtx.lineWidth = 1;
  hueCtx.strokeRect(x - 2, 0, 4, h);
}

function drawSVBox() {
  const w = cpSV.width, h = cpSV.height;
  const [r, g, b] = hsvToRgb(cpHueVal, 1, 1);

  // base hue color
  svCtx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
  svCtx.fillRect(0, 0, w, h);

  // white to transparent (saturation, left-right)
  let whiteGrad = svCtx.createLinearGradient(0, 0, w, 0);
  whiteGrad.addColorStop(0, 'rgba(255,255,255,1)');
  whiteGrad.addColorStop(1, 'rgba(255,255,255,0)');
  svCtx.fillStyle = whiteGrad;
  svCtx.fillRect(0, 0, w, h);

  // black to transparent (value, top-bottom)
  let blackGrad = svCtx.createLinearGradient(0, 0, 0, h);
  blackGrad.addColorStop(0, 'rgba(0,0,0,0)');
  blackGrad.addColorStop(1, 'rgba(0,0,0,1)');
  svCtx.fillStyle = blackGrad;
  svCtx.fillRect(0, 0, w, h);

  // marker
  const mx = cpSatVal * w;
  const my = (1 - cpValVal) * h;
  svCtx.beginPath();
  svCtx.arc(mx, my, 7, 0, Math.PI * 2);
  svCtx.strokeStyle = '#ffffff';
  svCtx.lineWidth = 2;
  svCtx.stroke();
  svCtx.beginPath();
  svCtx.arc(mx, my, 7, 0, Math.PI * 2);
  svCtx.strokeStyle = 'rgba(0,0,0,0.4)';
  svCtx.lineWidth = 1;
  svCtx.stroke();
}

function updateCpPreview() {
  const [r, g, b] = hsvToRgb(cpHueVal, cpSatVal, cpValVal);
  const hex = rgbToHex(r, g, b);
  cpPreview.style.background = hex;
  cpHexInput.value = hex.toUpperCase();
}

function setColorFromHex(hex) {
  const rgb = hexToRgb(hex);
  if (!rgb) return false;
  const [h, s, v] = rgbToHsv(rgb[0], rgb[1], rgb[2]);
  cpHueVal = h; cpSatVal = s; cpValVal = v;
  drawHueBar();
  drawSVBox();
  updateCpPreview();
  return true;
}

function openColorPicker(target) {
  cpActiveTarget = target;
  setColorFromHex(colorState[target] || '#000000');
  renderRecentColors();
  cpOverlay.classList.add('open');
}

function closeColorPicker() {
  cpOverlay.classList.remove('open');
  cpActiveTarget = null;
}

function renderRecentColors() {
  cpRecentRow.innerHTML = '';
  recentColors.forEach(hex => {
    const sw = document.createElement('div');
    sw.className = 'cp-recent-swatch';
    sw.style.background = hex;
    sw.title = hex;
    sw.addEventListener('click', () => setColorFromHex(hex));
    cpRecentRow.appendChild(sw);
  });
}

function addRecentColor(hex) {
  hex = hex.toLowerCase();
  recentColors = recentColors.filter(c => c !== hex);
  recentColors.unshift(hex);
  if (recentColors.length > 8) recentColors = recentColors.slice(0, 8);
}

// swatch buttons open the picker
document.querySelectorAll('.color-swatch-btn').forEach(btn => {
  btn.addEventListener('click', () => openColorPicker(btn.dataset.target));
});

cpCloseBtn.addEventListener('click', closeColorPicker);
cpOverlay.addEventListener('click', (e) => {
  if (e.target === cpOverlay) closeColorPicker();
});

// SV box drag handling
function handleSVPointer(e) {
  const rect = cpSV.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  let x = (clientX - rect.left) / rect.width;
  let y = (clientY - rect.top) / rect.height;
  x = Math.max(0, Math.min(1, x));
  y = Math.max(0, Math.min(1, y));
  cpSatVal = x;
  cpValVal = 1 - y;
  drawSVBox();
  updateCpPreview();
}

let svDragging = false;
cpSV.addEventListener('mousedown', (e) => { svDragging = true; handleSVPointer(e); });
window.addEventListener('mousemove', (e) => { if (svDragging) handleSVPointer(e); });
window.addEventListener('mouseup', () => { svDragging = false; });
cpSV.addEventListener('touchstart', (e) => { svDragging = true; handleSVPointer(e); e.preventDefault(); }, { passive: false });
cpSV.addEventListener('touchmove', (e) => { if (svDragging) { handleSVPointer(e); e.preventDefault(); } }, { passive: false });
cpSV.addEventListener('touchend', () => { svDragging = false; });

// Hue bar drag handling
function handleHuePointer(e) {
  const rect = cpHue.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  let x = (clientX - rect.left) / rect.width;
  x = Math.max(0, Math.min(1, x));
  cpHueVal = x * 360;
  drawHueBar();
  drawSVBox();
  updateCpPreview();
}

let hueDragging = false;
cpHue.addEventListener('mousedown', (e) => { hueDragging = true; handleHuePointer(e); });
window.addEventListener('mousemove', (e) => { if (hueDragging) handleHuePointer(e); });
window.addEventListener('mouseup', () => { hueDragging = false; });
cpHue.addEventListener('touchstart', (e) => { hueDragging = true; handleHuePointer(e); e.preventDefault(); }, { passive: false });
cpHue.addEventListener('touchmove', (e) => { if (hueDragging) { handleHuePointer(e); e.preventDefault(); } }, { passive: false });
cpHue.addEventListener('touchend', () => { hueDragging = false; });

// hex input manual entry
cpHexInput.addEventListener('input', () => {
  let val = cpHexInput.value.trim();
  if (!val.startsWith('#')) val = '#' + val;
  if (/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(val)) {
    setColorFromHex(val);
  }
});

cpApplyBtn.addEventListener('click', () => {
  if (!cpActiveTarget) return;
  const hex = cpHexInput.value.trim();
  if (!/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex)) return;

  colorState[cpActiveTarget] = hex;
  document.getElementById('swatch-' + cpActiveTarget).style.background = hex;
  document.getElementById('hexlabel-' + cpActiveTarget).textContent = hex.toUpperCase();
  addRecentColor(hex);
  closeColorPicker();
  renderQR();
});

// initial render on load
renderQR();

</script>
</body>
</html>
